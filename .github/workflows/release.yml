name: Build & Release

# Tag push -> build all platforms -> attach artifacts to a GitHub Release.
# Tag example: v0.1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable

jobs:
  # ---------------------------------------------------------------- Android
  android:
    name: Android (per-ABI APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # --split-per-abi -> one APK each: armeabi-v7a (arm), arm64-v8a (arm64), x86_64.
      - run: flutter build apk --release --split-per-abi
      # Universal AAB (Play Store splits per device).
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab

  # -------------------------------------------------------------------- iOS
  ios:
    name: iOS (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      # No signing certs in CI -> build without codesign, package the .app into an unsigned .ipa.
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r -q dexter-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/ios/iphoneos/dexter-ios-unsigned.ipa

  # ------------------------------------------------------------------- Web
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build web --release
      - name: Archive web build
        run: cd build/web && zip -r -q ../../dexter-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: dexter-web.zip

  # ----------------------------------------------------------------- Linux
  linux:
    name: Linux (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Archive Linux bundle
        run: cd build/linux/${{ matrix.arch }}/release/bundle && tar -czf "$GITHUB_WORKSPACE/dexter-linux-${{ matrix.arch }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dexter-linux-${{ matrix.arch }}.tar.gz

  # --------------------------------------------------------------- Windows
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Archive Windows bundle
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dexter-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dexter-windows-x64.zip

  # ----------------------------------------------------------------- macOS
  macos:
    name: macOS (universal arm64 + x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - name: Archive macOS app
        run: cd build/macos/Build/Products/Release && zip -r -q ../../../../../../dexter-macos.zip *.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dexter-macos.zip

  # --------------------------------------------------------------- Release
  release:
    name: Publish GitHub Release
    needs: [android, ios, web, linux, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
